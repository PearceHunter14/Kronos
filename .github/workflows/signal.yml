name: Crypto Signal Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  signal-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Kronos
        run: git clone --depth=1 https://github.com/shiyu-coder/Kronos.git ~/Kronos

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kronos-hf-models-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python btc_signal.py --once

      - name: Commit updated portfolio
        run: |
          git config user.name  "Signal Agent"
          git config user.email "action@github.com"
          git add portfolio.json
          git diff --staged --quiet || git commit -m "portfolio update $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
          
      - name: Send weekly summary (Mondays only)
        if: github.event.schedule == '0 8 * * 1'
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python btc_signal.py --summary
